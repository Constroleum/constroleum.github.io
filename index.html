  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #080808;
      --white:  #f0ede8;
      --muted:  #666;
      --accent: #c8a96e;
      --border: #222;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Background image — faint */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('images/gallery/Laberint-musical.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.07;
      filter: grayscale(100%);
    }

    .wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      animation: fadeUp 1s ease both;
    }

    /* Thin rule */
    .rule {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 2.4rem;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 4.2rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .name em {
      font-style: italic;
      color: rgba(240,237,232,0.5);
    }

    .tagline {
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4rem;
    }

    /* Language grid */
    .lang-grid {
      display: flex;
      gap: 2px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    .lang-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 90px;
      padding: 1.4rem 0.8rem;
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      transition: border-color 0.3s, color 0.3s, background 0.3s;
      cursor: pointer;
    }

    .lang-link:hover {
      border-color: var(--accent);
      color: var(--white);
      background: rgba(200,169,110,0.06);
    }

    .lang-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      font-style: italic;
      line-height: 1;
    }

    .lang-name {
      font-size: 0.52rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* location line */
    .location {
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #333;
    }

    .location span {
      color: #444;
      margin: 0 0.6rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Stagger children */
    .rule       { animation: fadeUp 0.8s 0.1s both; }
    .name       { animation: fadeUp 0.8s 0.25s both; }
    .tagline    { animation: fadeUp 0.8s 0.4s both; }
    .lang-grid  { animation: fadeUp 0.8s 0.6s both; }
    .location   { animation: fadeUp 0.8s 0.8s both; }
  </style>
</head>
